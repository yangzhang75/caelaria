<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Module | Deepfake Detection Drill</title>
  <style>
    :root{--bg:#0f141a;--card:#1a212a;--text:#e2e8f0;--muted:#94a3b8;--teal:#0ea5e9;--ok:#22c55e;--bad:#ef4444}
    *{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;padding:2rem}
    .wrap{max-width:850px;margin:auto}.card{background:var(--card);padding:1.5rem;border:1px solid rgba(148,163,184,.2);border-radius:12px}
    h1{margin-bottom:.7rem}p{color:var(--muted);line-height:1.6}.q{margin:1rem 0}.q label{display:block;margin:.4rem 0}
    .actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1rem}button,a{border:1px solid var(--teal);background:transparent;color:var(--teal);padding:.7rem 1rem;border-radius:6px;cursor:pointer;text-decoration:none}
    button:hover,a:hover{background:var(--teal);color:#051018}.result{margin-top:1rem;padding:.8rem;border-radius:6px;display:none}.ok{display:block;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.4);color:var(--ok)}.bad{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--bad)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Deepfake Detection Drill</h1>
      <p>Scenario: A voice note claims to be from your director requesting an urgent transfer. Pick the strongest risk indicators.</p>
      <div class="q">
        <label><input type="checkbox" id="c1"> Sender asks to bypass approval policy</label>
        <label><input type="checkbox" id="c2"> Audio has synthetic cadence artifacts</label>
        <label><input type="checkbox" id="c3"> Message includes normal project update</label>
        <label><input type="checkbox" id="c4"> Caller ID does not match known number</label>
      </div>
      <div class="actions">
        <button onclick="score()">Submit Findings</button>
        <button onclick="resetGame()">Reset Module</button>
        <a href="escapes.html">Back to Escapes</a>
      </div>
      <div id="result" class="result"></div>
    </div>
  </div>
  <script>
    function score(){
      const right=['c1','c2','c4'], wrong=['c3'];
      const correct=right.every(id=>document.getElementById(id).checked)&&wrong.every(id=>!document.getElementById(id).checked);
      const r=document.getElementById('result');
      if(correct){r.className='result ok';r.textContent='Correct. You identified high-confidence deepfake indicators and followed policy-aware escalation.';}
      else{r.className='result bad';r.textContent='Not quite. Re-check policy bypass, signal artifacts, and identity mismatch indicators.';}
    }
    function resetGame(){['c1','c2','c3','c4'].forEach(id=>document.getElementById(id).checked=false);const r=document.getElementById('result');r.className='result';r.textContent='';}
  </script>
</body>
</html>
