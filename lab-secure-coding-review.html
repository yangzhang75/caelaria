<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Module | Secure Coding Review</title>
  <style>
    :root{--bg:#0e1319;--card:#1a212a;--text:#e2e8f0;--muted:#94a3b8;--teal:#0ea5e9;--ok:#22c55e;--bad:#ef4444}
    *{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;padding:2rem}
    .wrap{max-width:900px;margin:auto}.card{background:var(--card);border:1px solid rgba(148,163,184,.2);padding:1.5rem;border-radius:12px}
    h1{margin-bottom:.7rem}p{color:var(--muted);line-height:1.6}.code{margin:1rem 0;padding:1rem;background:#0a0f14;border:1px solid rgba(148,163,184,.2);border-radius:8px;font-family:monospace;white-space:pre-wrap}
    .q label{display:block;margin:.45rem 0}.actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1rem}
    button,a{border:1px solid var(--teal);background:transparent;color:var(--teal);padding:.7rem 1rem;border-radius:6px;cursor:pointer;text-decoration:none}
    button:hover,a:hover{background:var(--teal);color:#051018}.result{margin-top:1rem;padding:.8rem;border-radius:6px;display:none}.ok{display:block;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.4);color:var(--ok)}.bad{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--bad)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Secure Coding Review Lab</h1>
      <p>Identify the strongest mitigation for the vulnerable pattern below.</p>
      <div class="code">const query = "SELECT * FROM users WHERE email='" + input + "'";</div>
      <div class="q">
        <label><input type="radio" name="fix" value="a"> Keep string concat but trim whitespace first</label>
        <label><input type="radio" name="fix" value="b"> Use parameterized query / prepared statement</label>
        <label><input type="radio" name="fix" value="c"> Base64-encode input before concat</label>
      </div>
      <div class="actions">
        <button onclick="check()">Submit Fix</button>
        <button onclick="resetGame()">Reset Module</button>
        <a href="/home/runner/work/caelaria/caelaria/labs.html">Back to Labs</a>
      </div>
      <div id="result" class="result"></div>
    </div>
  </div>
  <script>
    function check(){
      const picked=document.querySelector('input[name="fix"]:checked');
      const r=document.getElementById('result');
      if(picked&&picked.value==='b'){r.className='result ok';r.textContent='Correct. Parameterized queries mitigate SQL injection risk.';}
      else{r.className='result bad';r.textContent='Not correct. Choose the option that removes unsafe query concatenation.';}
    }
    function resetGame(){document.querySelectorAll('input[name="fix"]').forEach(r=>r.checked=false);const out=document.getElementById('result');out.className='result';out.textContent='';}
  </script>
</body>
</html>
